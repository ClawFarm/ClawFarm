<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Fleet Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
        }
        a { color: #7b68ee; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .header {
            padding: 2rem;
            border-bottom: 1px solid #333;
        }
        .header h1 { font-size: 1.5rem; color: #7b68ee; }

        /* --- New Bot Form --- */
        .form-section {
            padding: 2rem;
            border-bottom: 1px solid #333;
        }
        .form-section h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #ccc; }
        .form-row { display: flex; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
        .form-row input, .form-row textarea, .form-row button {
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.6rem 0.8rem;
            border: 1px solid #444;
            border-radius: 4px;
            background: #16213e;
            color: #e0e0e0;
            min-height: 44px;
        }
        .form-row input { flex: 1; min-width: 200px; }
        .form-row textarea { width: 100%; min-height: 80px; resize: vertical; }
        .btn-create {
            background: #7b68ee;
            color: #fff;
            border: none;
            cursor: pointer;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            font-weight: bold;
            min-height: 44px;
        }
        .btn-create:hover { background: #6a5acd; }

        /* --- Bot Grid --- */
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
            padding: 2rem;
        }
        .bot-card {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.2rem;
        }
        .bot-card h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .bot-meta { font-size: 0.85rem; color: #999; margin-bottom: 0.75rem; }
        .status-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-running { background: #2e7d32; color: #c8e6c9; }
        .status-exited  { background: #c62828; color: #ffcdd2; }
        .status-created { background: #f57f17; color: #fff9c4; }
        .status-default { background: #555; color: #ddd; }

        .bot-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .bot-actions button {
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.4rem 0.7rem;
            border: 1px solid #555;
            border-radius: 3px;
            background: #1a1a2e;
            color: #e0e0e0;
            cursor: pointer;
            min-height: 44px;
            min-width: 44px;
        }
        .bot-actions button:hover { background: #333; }
        .btn-delete { border-color: #c62828 !important; color: #ef9a9a !important; }
        .btn-delete:hover { background: #c62828 !important; color: #fff !important; }

        /* --- Logs Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #16213e;
            border: 1px solid #444;
            border-radius: 8px;
            width: 80vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #333;
        }
        .modal-header h3 { font-size: 1rem; }
        .modal-close {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 1.5rem;
            cursor: pointer;
            min-height: 44px;
            min-width: 44px;
        }
        .modal-body {
            padding: 1rem;
            overflow: auto;
            flex: 1;
        }
        .modal-body pre {
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #ccc;
        }

        /* --- Toast --- */
        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            background: #333;
            color: #e0e0e0;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            animation: fadeIn 0.2s;
            max-width: 350px;
        }
        .toast.error { border-left: 3px solid #c62828; }
        .toast.success { border-left: 3px solid #2e7d32; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .empty-state {
            padding: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.95rem;
        }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            .header, .form-section { padding: 1rem; }
            .bot-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
            .form-row { flex-direction: column; }
            .form-row input, .btn-create { width: 100%; }
            .form-row textarea { min-height: 60px; }
            .bot-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
            .modal {
                width: 100vw;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }
            .toast-container {
                right: 50%;
                transform: translateX(50%);
            }
            .toast { max-width: 90vw; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>OpenClaw Fleet Manager</h1>
    </div>

    <div class="form-section">
        <h2>New Bot</h2>
        <div class="form-row">
            <input type="text" id="bot-name" placeholder="Bot name (e.g. research-bot)">
            <button class="btn-create" onclick="createBot()">Create</button>
        </div>
        <div class="form-row">
            <textarea id="bot-soul" placeholder="SOUL.md — custom personality (optional)"></textarea>
        </div>
    </div>

    <div id="bot-grid" class="bot-grid"></div>
    <div id="empty-state" class="empty-state" style="display:none;">No bots yet. Create one above.</div>

    <div class="modal-overlay" id="logs-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="logs-title">Logs</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="logs-content"></pre>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        async function fetchBots() {
            try {
                const res = await fetch('/api/bots');
                const bots = await res.json();
                renderBots(bots);
            } catch (e) {
                showToast('Failed to fetch bots', 'error');
            }
        }

        function renderBots(bots) {
            const grid = document.getElementById('bot-grid');
            const empty = document.getElementById('empty-state');
            if (bots.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            grid.innerHTML = bots.map(bot => {
                const statusClass = ['running','exited','created'].includes(bot.status)
                    ? `status-${bot.status}` : 'status-default';
                return `
                <div class="bot-card">
                    <h3>${esc(bot.name)}</h3>
                    <div class="bot-meta">
                        <span class="status-badge ${statusClass}">${esc(bot.status)}</span>
                        &nbsp; Port: ${bot.port}
                        &nbsp; <a href="http://${location.hostname}:${bot.port}" target="_blank">Open UI</a>
                    </div>
                    <div class="bot-actions">
                        <button onclick="startBot('${esc(bot.name)}')">Start</button>
                        <button onclick="stopBot('${esc(bot.name)}')">Stop</button>
                        <button onclick="restartBot('${esc(bot.name)}')">Restart</button>
                        <button onclick="showLogs('${esc(bot.name)}')">Logs</button>
                        <button class="btn-delete" onclick="deleteBot('${esc(bot.name)}')">Delete</button>
                    </div>
                </div>`;
            }).join('');
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function createBot() {
            const name = document.getElementById('bot-name').value.trim();
            if (!name) { showToast('Name is required', 'error'); return; }
            const soul = document.getElementById('bot-soul').value;
            try {
                const res = await fetch('/api/bots', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, soul: soul || null })
                });
                const data = await res.json();
                if (!res.ok) { showToast(data.detail || 'Error', 'error'); return; }
                showToast(`Bot "${data.name}" created on port ${data.port}`, 'success');
                document.getElementById('bot-name').value = '';
                document.getElementById('bot-soul').value = '';
                fetchBots();
            } catch (e) {
                showToast('Failed to create bot', 'error');
            }
        }

        async function botAction(name, method, path) {
            try {
                const res = await fetch(`/api/bots/${encodeURIComponent(name)}${path}`, { method });
                const data = await res.json();
                if (!res.ok) { showToast(data.detail || 'Error', 'error'); return; }
                showToast(`${name}: ${JSON.stringify(data)}`, 'success');
                fetchBots();
            } catch (e) {
                showToast(`Action failed for ${name}`, 'error');
            }
        }

        function startBot(name)   { botAction(name, 'POST', '/start'); }
        function stopBot(name)    { botAction(name, 'POST', '/stop'); }
        function restartBot(name) { botAction(name, 'POST', '/restart'); }

        function deleteBot(name) {
            if (!confirm(`Delete bot "${name}"? This removes the container, network, and config.`)) return;
            botAction(name, 'DELETE', '');
        }

        async function showLogs(name) {
            document.getElementById('logs-title').textContent = `Logs — ${name}`;
            document.getElementById('logs-content').textContent = 'Loading...';
            document.getElementById('logs-modal').classList.add('active');
            try {
                const res = await fetch(`/api/bots/${encodeURIComponent(name)}/logs`);
                const data = await res.json();
                if (!res.ok) { document.getElementById('logs-content').textContent = data.detail || 'Error'; return; }
                document.getElementById('logs-content').textContent = data.logs || '(no logs)';
            } catch (e) {
                document.getElementById('logs-content').textContent = 'Failed to fetch logs.';
            }
        }

        function closeModal() {
            document.getElementById('logs-modal').classList.remove('active');
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type || ''}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // Close modal on overlay click
        document.getElementById('logs-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initial load
        fetchBots();
    </script>
</body>
</html>
