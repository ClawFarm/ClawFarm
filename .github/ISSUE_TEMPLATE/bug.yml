name: Bug Report
description: Report a bug in ClawFarm
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Deployment details
      placeholder: |
        - Deployment: Docker Compose / dev mode
        - TLS mode: internal / acme / custom / off
        - Browser: Chrome / Firefox / Safari
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs from `docker compose logs`
      render: shell
    validations:
      required: false
