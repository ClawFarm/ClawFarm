services:
  dashboard:
    build:
      context: ./dashboard
      network: host
    group_add:
      - "${DOCKER_GID:-988}"
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bots:/data/bots
      - ./bot-template:/data/bot-template
      - ${BACKUP_DIR:-./backups}:/data/backups
    environment:
      - BOTS_DIR=/data/bots
      - HOST_BOTS_DIR=${PWD}/bots
      - TEMPLATE_DIR=/data/bot-template
      - BACKUP_DIR=/data/backups
      - CADDY_ADMIN_URL=http://caddy:2019
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
      args:
        - API_URL=http://dashboard:8080
    expose:
      - "3000"
    environment:
      - API_URL=http://dashboard:8080
      - HOSTNAME=0.0.0.0
    depends_on:
      - dashboard
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "${CADDY_PORT:-8443}:8443"
      - "80:80"
      - "${BOT_PORT_START:-3001}-${BOT_PORT_END:-3100}:${BOT_PORT_START:-3001}-${BOT_PORT_END:-3100}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
