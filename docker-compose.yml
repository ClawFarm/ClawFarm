services:
  dashboard:
    image: ghcr.io/clawfarm/clawfarm-dashboard:latest
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bots:/data/bots
      - ./bot-template:/data/bot-template
      - ${BACKUP_DIR:-./backups}:/data/backups
    environment:
      - BOTS_DIR=/data/bots
      - HOST_BOTS_DIR=${PWD}/bots
      - TEMPLATE_DIR=/data/bot-template
      - BACKUP_DIR=/data/backups
      - CADDY_ADMIN_URL=http://caddy:2019
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: ghcr.io/clawfarm/clawfarm-frontend:latest
    expose:
      - "3000"
    environment:
      - API_URL=http://dashboard:8080
      - HOSTNAME=0.0.0.0
    depends_on:
      - dashboard
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "${CADDY_PORT:-8443}:8080"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
