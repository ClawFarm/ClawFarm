services:
  dashboard:
    build: ./dashboard
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bots:/data/bots
      - ./bot-template:/data/bot-template
    environment:
      - BOTS_DIR=/data/bots
      - TEMPLATE_DIR=/data/bot-template
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - API_URL=http://dashboard:8080
    depends_on:
      - dashboard
    restart: unless-stopped
